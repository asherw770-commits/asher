<div id="syncStatus" style="position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));left:8px;z-index:9999;background:rgba(15,23,42,.92);border:1px solid rgba(148,163,184,.25);border-radius:999px;padding:3px 9px;font-family:'Heebo',sans-serif;font-size:10px;font-weight:600;color:#9ba8bb;display:flex;align-items:center;gap:5px;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;opacity:.8" onclick="window.__fbStatusClick&&window.__fbStatusClick()" title="לחץ לפרטים">
  <span id="syncDot" style="width:7px;height:7px;border-radius:50%;background:#6b7280;display:inline-block"></span>
  <span id="syncText">מתחבר...</span>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCrbC53oSdWtympmtlLU5QCBioFuRoVOEI",
  authDomain: "asher-83679.firebaseapp.com",
  projectId: "asher-83679",
  storageBucket: "asher-83679.firebasestorage.app",
  messagingSenderId: "640201884308",
  appId: "1:640201884308:web:47727a352fdbb6252aaa81",
  measurementId: "G-M4JFHSCQGL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const docRef = doc(db, 'app', 'main');

const CLIENT_ID = Math.random().toString(36).slice(2);
let saveTimer = null;
let pendingData = null;
let pendingJson = null;
let lastSentJson = null;
let firstSnapshot = true;
let lastError = null;
let lastSyncedAt = null;
let saveCount = 0;

function setStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot || !txt) return;
  const colors = { connecting:'#f59e0b', synced:'#22c55e', saving:'#3b82f6', error:'#ef4444' };
  dot.style.background = colors[state] || '#6b7280';
  txt.textContent = text;
}

window.__fbStatusClick = function() {
  if (lastError) {
    alert('שגיאת סנכרון:\n\n' + lastError + '\n\nוודא ש:\n1. Firestore Database נוצר ב-Firebase Console\n2. Anonymous Auth מופעל\n3. ה-Security Rules פורסמו\n4. הדומיין הזה מורשה ב-Authorized domains');
  } else if (lastSyncedAt) {
    alert('הכל מסונכרן ✓\nסנכרון אחרון: ' + lastSyncedAt.toLocaleTimeString('he-IL'));
  } else {
    alert('עדיין מתחבר ל-Firebase...');
  }
};

async function flushSave() {
  if (!pendingData || !auth.currentUser || inFlight) return;
  inFlight = true;
  const data = pendingData;
  const json = pendingJson;
  pendingData = null;
  pendingJson = null;
  setStatus('saving', 'שומר...');
  try {
    await setDoc(docRef, {
      data: data,
      _clientId: CLIENT_ID,
      _updatedAt: serverTimestamp()
    });
    lastSentJson = json;
    saveCount++;
    lastError = null;
    lastSyncedAt = new Date();
    setStatus('synced', 'מסונכרן');
  } catch (e) {
    console.error('Firestore save failed:', e);
    lastError = e.message || String(e);
    // Restore so we'll retry next change
    pendingData = data;
    pendingJson = json;
    setStatus('error', 'שגיאה');
  } finally {
    inFlight = false;
    lastFlushAt = Date.now();
    // If something arrived during the write, schedule a follow-up
    if (pendingData) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(flushSave, MIN_GAP_MS);
    }
  }
}

let inFlight = false;
let lastFlushAt = 0;
const MIN_GAP_MS = 400; // Minimum gap between writes during a burst

window.__fbSave = function(data) {
  let json;
  try {
    json = JSON.stringify(data);
  } catch (e) {
    lastError = 'נתונים לא תקינים: ' + e.message;
    setStatus('error', 'שגיאה');
    return;
  }
  // Skip if data hasn't actually changed since last successful save
  if (json === lastSentJson) return;
  // Skip if we're already going to save the exact same thing
  if (json === pendingJson) return;
  pendingJson = json;
  pendingData = JSON.parse(json);
  // Warn if document is too big (Firestore limit is ~1MB)
  const size = new Blob([json]).size;
  if (size > 900000) {
    lastError = 'הנתונים גדולים מ-1MB ('+Math.round(size/1024)+'KB). תמונות שנוספו לאחרונה לא יסתנכרנו. נסה למחוק תמונות ישנות.';
    setStatus('error', 'מסמך גדול מדי');
    console.warn('Document size:', size);
  }
  // Leading-edge: if we haven't written recently and nothing is in flight, flush immediately.
  // Otherwise, schedule a trailing flush so rapid successive changes are batched.
  clearTimeout(saveTimer);
  const sinceLast = Date.now() - lastFlushAt;
  if (!inFlight && sinceLast >= MIN_GAP_MS) {
    flushSave();
  } else {
    const wait = Math.max(MIN_GAP_MS - sinceLast, 200);
    saveTimer = setTimeout(flushSave, wait);
  }
};

setStatus('connecting', 'מתחבר...');

signInAnonymously(auth).catch(e => {
  console.error('Anonymous sign-in failed:', e);
  lastError = 'אימות נכשל: ' + (e.message || e.code) + '\n\nוודא ש-Anonymous Authentication מופעל ב-Firebase Console.';
  setStatus('error', 'אימות נכשל');
});

onAuthStateChanged(auth, user => {
  if (!user) return;
  setStatus('connecting', 'טוען נתונים...');
  onSnapshot(docRef, snap => {
    if (!snap.exists()) {
      // First-time setup: push current local data to cloud
      const d = window.__getCurrentD ? window.__getCurrentD() : null;
      if (d) {
        const json = JSON.stringify(d);
        pendingJson = json;
        pendingData = JSON.parse(json);
        flushSave();
      } else {
        setStatus('synced', 'מסונכרן (ריק)');
        lastSyncedAt = new Date();
      }
      firstSnapshot = false;
      return;
    }
    const payload = snap.data();
    // Always ignore echoes from this client — even stale ones could revert state
    if (payload._clientId === CLIENT_ID && !firstSnapshot) {
      lastSyncedAt = new Date();
      setStatus('synced', 'מסונכרן');
      return;
    }
    if (payload.data && window.__remoteApply) {
      // Track this as the last known cloud state so we don't write it back
      lastSentJson = JSON.stringify(payload.data);
      window.__remoteApply(payload.data);
    }
    lastSyncedAt = new Date();
    lastError = null;
    setStatus('synced', 'מסונכרן');
    firstSnapshot = false;
  }, err => {
    console.error('Firestore snapshot error:', err);
    lastError = 'קריאה נכשלה: ' + (err.message || err.code) + '\n\nוודא ש-Firestore Database נוצר וש-Security Rules מאפשרים גישה.';
    setStatus('error', 'שגיאה');
  });
});

// Flush pending writes before tab closes
window.addEventListener('beforeunload', () => {
  if (pendingData) flushSave();
});
</script>
